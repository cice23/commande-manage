<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mcommerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <nav class="navbar navbar-expand-lg navbar-light bg-light rounded mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Mcommerce Client</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="#navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">Accueil</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="row gy-4">
        <div class="col-12 mb-3 text-center">
            <h1>Nos produits</h1>
            <p class="text-muted">Choisissez un produit pour voir ses détails et commander en quelques clics.</p>
        </div>

        <div th:each="produit : ${produits}" class="col-md-4">
            <div class="card h-100 shadow-sm">
                <img th:src="${produit.image}" class="card-img-top" alt="Produit image" style="height:220px; object-fit:cover;" />
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${produit.titre}">Titre du produit</h5>
                    <p class="card-text text-truncate" th:text="${produit.description}">Description rapide</p>
                    <p class="fw-bold">Prix : <span th:text="${produit.prix} + ' €'"></span></p>
                    <div class="mt-auto">
                        <a th:href="@{|/details-produit/${produit.id}|}" class="btn btn-primary w-100">Voir les détails</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
