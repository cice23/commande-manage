<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; }
        .error-container { text-align: center; padding: 2rem; }
        .error-code { font-size: 5rem; font-weight: bold; color: #dc3545; }
        .error-message { font-size: 1.5rem; color: #6c757d; margin-top: 1rem; }
        .error-details { margin-top: 2rem; color: #495057; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code" th:text="${statusCode}">Erreur</div>
        <div class="error-message">Une erreur est survenue</div>
        <div class="error-details">
            <p th:text="${errorMessage}"></p>
            <a href="/" class="btn btn-primary mt-3">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
