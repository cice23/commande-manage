spring.application.name=microservice-commandes
spring.cloud.config.uri=http://localhost:9200
server.port=9212

#Eureka
eureka.client.service-url.defaultZone=http://localhost:9201/eureka/
eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

#zekpin
spring.zipkin.base-url=http://localhost:9411
spring.sleuth.sampler.probability=1.0
spring.main.allow-bean-definition-overriding=true

#Actuator
management.endpoints.web.exposure.include=health,refresh
management.endpoint.health.show-details=always
# Fixe un mot de passe simple pour vos tests
spring.security.user.name=admin
spring.security.user.password=admin